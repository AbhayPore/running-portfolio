<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Portfolio — example usage</title>
	<style>
		/* minimal styles to make cards readable */
		#projects-list { display:flex; gap:12px; flex-wrap:wrap; }
		.project-card { display:block; width:240px; padding:8px; border:1px solid #ddd; border-radius:6px; text-decoration:none; color:inherit; }
		.project-image{ width:100%; height:120px; object-fit:cover; border-radius:4px; background:#f3f3f3; }
		.project-tags{ margin-top:8px; }
		.project-tag{ display:inline-block; padding:2px 6px; margin-right:6px; background:#eef; border-radius:4px; font-size:12px; }
	</style>
</head>
<body>
	<header>
		<input id="projects-search" type="search" placeholder="Search projects (title, description, tags)" aria-label="Search projects" />
	</header>

	<!-- added: show a short message when JS is disabled -->
	<noscript>
		<p style="color:#a00; padding:8px; background:#fee; margin:0;">
			Enable JavaScript to view the project list.
		</p>
	</noscript>
	
	<main>
		<section id="projects-list" aria-live="polite">
			<!-- dynamic project cards will be injected here -->
		</section>
	</main>

	<!-- Include data first, then the dynamic renderer (use explicit relative paths) -->
	<script src="./data/projects.js"></script>

	<!-- normalize images: replace external/http(s) image URLs (e.g. via.placeholder.com) with inline SVG data-URLs -->
	<script>
		(function(){
			function escapeText(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
			function makeSvgDataUrl(text, w, h){
				w = w || 480; h = h || 240;
				var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"' viewBox='0 0 "+w+" "+h+"'>"
				        + "<rect width='100%' height='100%' fill='#eee'/>"
				        + "<text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#666' font-family='Arial,Helvetica,sans-serif' font-size='20'>"
				        + escapeText(text) + "</text></svg>";
				return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
			}

			function normalizeImages(){
				var projects = window.PROJECTS || [];
				for (var i=0;i<projects.length;i++){
					var p = projects[i];
					if (!p || !p.image || typeof p.image !== 'string') continue;
					var url = p.image.trim();
					// replace remote placeholders and any http(s) absolute URLs with inline SVG to avoid cross-origin failures
					if (url.indexOf('via.placeholder.com') !== -1 || /^https?:\/\//i.test(url)){
						p.image = makeSvgDataUrl(p.title || 'Project', 480, 240);
					}
				}
			}

			// data/projects.js is a blocking script, so window.PROJECTS will usually exist now.
			if (window.PROJECTS) {
				normalizeImages();
			} else {
				// fallback: wait briefly for data script to set window.PROJECTS
				var tries = 0, t = setInterval(function(){
					tries++;
					if (window.PROJECTS) { normalizeImages(); clearInterval(t); }
					if (tries > 10) clearInterval(t);
				}, 100);
			}
		})();
	</script>

	<script src="./scripts/dynamic.js"></script>

	<!-- improved debug/fallback: report 404s, provide inline data and renderer if external files are missing -->
	<script>
		(function(){
			function showError(msg){
				console.error(msg);
				var container = document.getElementById('projects-list');
				if (!container) return;
				if (!document.getElementById('projects-error')){
					var p = document.createElement('p');
					p.id = 'projects-error';
					p.style.color = '#a00';
					p.style.padding = '8px';
					p.style.background = '#fee';
					p.textContent = msg;
					container.parentNode.insertBefore(p, container);
				}
			}

			// Minimal inline data fallback (used when ./data/projects.js is missing)
			var INLINE_FALLBACK_PROJECTS = [
				{ id: 'sample-1', title: 'Sample Project', description: 'Fallback sample project because data/projects.js failed to load.', link: '#', tags: ['sample'], image: '' }
			];

			// Minimal renderer fallback (used when ./scripts/dynamic.js is missing)
			function minimalRenderProjects(list){
				var container = document.getElementById('projects-list');
				if (!container) return;
				container.innerHTML = '';
				if (!list || !list.length) {
					var e = document.createElement('p');
					e.textContent = 'No projects found.';
					container.appendChild(e);
					return;
				}
				list.forEach(function(p){
					var a = document.createElement('a');
					a.className = 'project-card';
					a.href = p.link || '#';
					a.setAttribute('aria-label', p.title || 'project');

					if (p.image) {
						var img = document.createElement('img');
						img.className = 'project-image';
						img.alt = p.title || '';
						img.src = p.image;
						img.loading = 'lazy';
						a.appendChild(img);
					}

					var h = document.createElement('h3');
					h.textContent = p.title || 'Untitled';
					a.appendChild(h);

					var d = document.createElement('p');
					d.className = 'project-desc';
					d.textContent = p.description || '';
					a.appendChild(d);

					if (p.tags && p.tags.length) {
						var tagWrap = document.createElement('div');
						tagWrap.className = 'project-tags';
						p.tags.forEach(function(t){
							var span = document.createElement('span');
							span.className = 'project-tag';
							span.textContent = t;
							tagWrap.appendChild(span);
						});
						a.appendChild(tagWrap);
					}
					container.appendChild(a);
				});
			}

			function minimalApplyFilter() {
				var q = (document.getElementById('projects-search')?.value || '').toLowerCase();
				var all = window.PROJECTS || INLINE_FALLBACK_PROJECTS;
				if (!q) return minimalRenderProjects(all);
				var filtered = all.filter(function(p){
					return (p.title||'').toLowerCase().includes(q)
						|| (p.description||'').toLowerCase().includes(q)
						|| ((p.tags||[]).some && p.tags.some(function(t){ return t.toLowerCase().includes(q); }));
				});
				minimalRenderProjects(filtered);
			}

			document.addEventListener('DOMContentLoaded', function(){
				// Check if data loaded
				if (!window.PROJECTS) {
					// try a fetch to produce clear Network errors in console and show friendly in-page error
					fetch('./data/projects.js', {cache: 'no-store'}).then(function(resp){
						if (!resp.ok) throw new Error('HTTP ' + resp.status);
						return resp.text();
					}).then(function(text){
						try {
							eval(text); // attempt to evaluate the file content
						} catch (e) {
							showError('Could not evaluate data/projects.js: ' + e.message);
						}
						if (!window.PROJECTS) {
							showError('data/projects.js did not define window.PROJECTS. Using inline fallback data.');
							window.PROJECTS = INLINE_FALLBACK_PROJECTS;
						}
					}).catch(function(err){
						showError('Could not load ./data/projects.js — check that the file exists in the repo and path is correct. (' + err.message + ')');
						window.PROJECTS = INLINE_FALLBACK_PROJECTS;
					}).finally(function(){
						// continue to renderer check after data attempt
						ensureRendererAndRender();
					});
				} else {
					ensureRendererAndRender();
				}

				function ensureRendererAndRender(){
					// If the real renderer loaded it may have attached renderProjects; check common markers
					var hasRenderer = (typeof window.renderProjects === 'function') || (typeof window.__dynamicRendererLoaded !== 'undefined');

					if (!hasRenderer) {
						// If scripts/dynamic.js did not attach a renderer, use the minimal fallback
						showError('scripts/dynamic.js did not load or did not register a renderer. Using inline fallback renderer.');
						// expose the minimal functions so other code can call them (and for devtools)
						window.renderProjects = minimalRenderProjects;
						window.applyFilter = minimalApplyFilter;
					}

					// initial render
					try {
						(window.renderProjects || minimalRenderProjects)(window.PROJECTS || INLINE_FALLBACK_PROJECTS);
					} catch (e) {
						showError('Rendering failed: ' + e.message);
					}

					// wire search input if not wired
					var s = document.getElementById('projects-search');
					if (s && !s._projectsSearchBound) {
						s.addEventListener('input', function(){ (window.applyFilter || minimalApplyFilter)(); });
						s._projectsSearchBound = true;
					}
				}
			});
		})();
	</script>

	<!-- diagnostics: fetch expected files and show HTTP status (appears bottom-right) -->
	<script>
		(function(){
			function logLine(txt){
				console.log(txt);
				var el = document.getElementById('projects-diag');
				if (!el) {
					el = document.createElement('pre');
					el.id = 'projects-diag';
					el.style.cssText = 'position:fixed;right:8px;bottom:8px;max-width:45%;max-height:40%;overflow:auto;background:#fff;border:1px solid #ccc;padding:8px;font-size:12px;line-height:1.3;z-index:99999';
					document.body.appendChild(el);
				}
				el.appendChild(document.createTextNode(txt + '\n'));
			}

			function checkUrl(url){
				return fetch(url, {method:'GET', cache:'no-store'}).then(function(resp){
					logLine(url + ' -> ' + resp.status + ' ' + (resp.statusText || ''));
				}).catch(function(err){
					logLine(url + ' -> ERROR: ' + err.message);
				});
			}

			document.addEventListener('DOMContentLoaded', function(){
				var urls = ['./data/projects.js', './scripts/dynamic.js'];

				// include images listed in window.PROJECTS if present
				try {
					(window.PROJECTS || []).forEach(function(p){
						if (p && p.image) {
							var u = p.image;
							// convert root-absolute to relative hint (for display only)
							urls.push(u);
						}
					});
				} catch(e){ /* ignore */ }

				logLine('Starting diagnostics...');
				// run checks sequentially to keep output readable
				urls.reduce(function(prev, u){
					return prev.then(function(){ return checkUrl(u); });
				}, Promise.resolve()).then(function(){
					logLine('Diagnostics finished. If any URL shows 404 or ERROR, copy it here.');
				});
			});
		})();
	</script>

	<!-- explanation helper: convert diagnostics errors into short actionable guidance -->
	<script>
		(function(){
			function makeBox(html){
				var b = document.getElementById('projects-explain');
				if (b) return b;
				b = document.createElement('div');
				b.id = 'projects-explain';
				b.style.cssText = 'position:fixed;right:8px;bottom:calc(8px + 42% + 8px);max-width:45%;background:#fff;border:1px solid #c33;padding:10px;font-size:13px;line-height:1.4;color:#222;z-index:100000';
				document.body.appendChild(b);
				return b;
			}

			function showExplanation(msg){
				var b = makeBox();
				b.innerHTML = '<strong>Network error explanation</strong><p style="margin:6px 0 0 0;">' + msg + '</p>';
			}

			function explainDiagnosticsText(text){
				text = String(text || '');
				// common conditions observed in your diagnostics
				if (text.indexOf('ERR_CONNECTION_CLOSED') !== -1 || text.indexOf('Failed to fetch') !== -1 || text.indexOf('ERROR: Failed to fetch') !== -1) {
					showExplanation(
						'The browser failed to fetch external images (via.placeholder.com). Possible causes: network or firewall blocking the remote host, the remote service refusing connections, browser extensions/privacy blockers, or intermittent connectivity. Quick fixes: open the image URL directly in the browser, try Incognito/disable extensions, use local images committed to the repo and reference them with relative paths (assets/...), or replace images with data-URLs to avoid external requests.'
					);
					return;
				}
				// if no known issue found, do nothing
			}

			// run after diagnostics populate
			document.addEventListener('DOMContentLoaded', function(){
				// allow the diagnostics script to run first
				setTimeout(function(){
					var diag = document.getElementById('projects-diag');
					if (diag) explainDiagnosticsText(diag.textContent);
				}, 700);
			});
		})();
	</script>

	<!-- fix: replace images that fail to load with inline SVG data-URLs and re-render -->
	<script>
		(function(){
			function escapeText(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
			function makeSvgDataUrl(text, w, h){
				w = w || 480; h = h || 240;
				var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"' viewBox='0 0 "+w+" "+h+"'>"
				        + "<rect width='100%' height='100%' fill='#eee'/>"
				        + "<text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#666' font-family='Arial,Helvetica,sans-serif' font-size='20'>"
				        + escapeText(text) + "</text></svg>";
				return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
			}

			function checkAndReplaceImages(projects, cb){
				if (!projects || !projects.length) return cb(false);
				var pending = 0, replaced = false;
				projects.forEach(function(p){
					if (!p || !p.image) return;
					// only test absolute/remote URLs or anything not already a data: URL
					if (String(p.image).startsWith('data:')) return;
					pending++;
					var img = new Image();
					// do not set crossOrigin to avoid CORS errors interfering with load event
					img.onload = function(){ if (--pending === 0) cb(replaced); };
					img.onerror = function(){
						// replace with inline SVG showing title
						p.image = makeSvgDataUrl(p.title || 'No image');
						replaced = true;
						if (--pending === 0) cb(replaced);
					};
					// kick off load
					img.src = p.image;
					// safety: if browser cached and loaded synchronously
					if (img.complete && img.naturalWidth) {
						// loaded successfully
						// nothing to do; decrement handled by onload but ensure onload runs
					}
				});
				// if nothing to check
				if (pending === 0) cb(replaced);
			}

			document.addEventListener('DOMContentLoaded', function(){
				// run only when project data exists
				var attempt = 0;
				function waitForProjects(){
					attempt++;
					if (window.PROJECTS) {
						checkAndReplaceImages(window.PROJECTS, function(changed){
							if (changed) {
								// prefer the real renderer if present
								try { (window.renderProjects || window.applyFilter || window.__dynamicRendererLoaded && window.renderProjects)(window.PROJECTS); } catch(e){
									// fallback: call exposed render or rely on fallback renderer already wired
									if (typeof window.renderProjects === 'function') window.renderProjects(window.PROJECTS);
								}
							}
						});
						return;
					}
					// give up after a few tries
					if (attempt < 6) setTimeout(waitForProjects, 300);
				}
				waitForProjects();
			});
		})();
	</script>
</body>
</html>
