<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Portfolio — example usage</title>
	<style>
		/* minimal styles to make cards readable */
		#projects-list { display:flex; gap:12px; flex-wrap:wrap; }
		.project-card { display:block; width:240px; padding:8px; border:1px solid #ddd; border-radius:6px; text-decoration:none; color:inherit; }
		.project-image{ width:100%; height:120px; object-fit:cover; border-radius:4px; background:#f3f3f3; }
		.project-tags{ margin-top:8px; }
		.project-tag{ display:inline-block; padding:2px 6px; margin-right:6px; background:#eef; border-radius:4px; font-size:12px; }
	</style>
</head>
<body>
	<header>
		<input id="projects-search" type="search" placeholder="Search projects (title, description, tags)" aria-label="Search projects" />
	</header>

	<!-- added: show a short message when JS is disabled -->
	<noscript>
		<p style="color:#a00; padding:8px; background:#fee; margin:0;">
			Enable JavaScript to view the project list.
		</p>
	</noscript>
	
	<main>
		<section id="projects-list" aria-live="polite">
			<!-- dynamic project cards will be injected here -->
		</section>
	</main>

	<!-- Include data first, then the dynamic renderer (use explicit relative paths) -->
	<script src="./data/projects.js"></script>
	<script src="./scripts/dynamic.js"></script>

	<!-- debug/fallback: if data didn't load, try fetching and show a message -->
	<script>
		(function(){
			function showError(msg){
				console.error(msg);
				var container = document.getElementById('projects-list');
				if (!container) return;
				if (!document.getElementById('projects-error')){
					var p = document.createElement('p');
					p.id = 'projects-error';
					p.style.color = '#a00';
					p.style.padding = '8px';
					p.style.background = '#fee';
					p.textContent = msg;
					container.parentNode.insertBefore(p, container);
				}
			}

			document.addEventListener('DOMContentLoaded', function(){
				// If the data script didn't define window.PROJECTS, try fetching it to produce a clearer error
				if (!window.PROJECTS) {
					fetch('./data/projects.js').then(function(resp){
						if (!resp.ok) throw new Error('HTTP ' + resp.status);
						return resp.text();
					}).then(function(text){
						try {
							eval(text); // load the file content (simple fallback)
							console.info('Loaded data/projects.js via fetch fallback');
							if (window.PROJECTS && window.PROJECTS.length) {
								// attempt to re-run renderer if present
								if (typeof window.renderProjects === 'function') window.renderProjects(window.PROJECTS);
							}
						} catch (e) {
							showError('Failed to evaluate data/projects.js: ' + e.message);
						}
					}).catch(function(err){
						showError('Could not load ./data/projects.js — check that the file exists in the repo and path is correct. (' + err.message + ')');
					});
				}
			});
		})();
	</script>
</body>
</html>
